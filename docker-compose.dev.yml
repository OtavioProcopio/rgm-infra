# Stack completa de desenvolvimento — hot reload para backend e frontend.
# Use: make up
# Alternativa leve (só infra): make infra-up  → roda backend/frontend nativo no host.

services:
  # ── Infra ───────────────────────────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    container_name: rgm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rgm}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rgm}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: rgm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ../data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: rgm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET_NAME:-images};
      mc anonymous set download local/${MINIO_BUCKET_NAME:-images};
      exit 0;
      "

  # ── Backend ─────────────────────────────────────────────────────────────────

  backend:
    image: eclipse-temurin:21-jdk-alpine
    container_name: rgm-backend-dev
    restart: unless-stopped
    volumes:
      - ../rgm-backend:/workspace
      - maven-cache:/root/.m2
    working_dir: /workspace/app
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-rgm}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      MINIO_URL: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-images}
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    command: >
      sh -c "chmod +x mvnw && ./mvnw spring-boot:run"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 90s
      retries: 5

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    image: node:22-alpine
    container_name: rgm-frontend-dev
    restart: unless-stopped
    volumes:
      - ../rgm-frontend/app:/workspace
      - npm-cache:/root/.npm
    working_dir: /workspace
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    command: >
      sh -c "npm install --prefer-offline && npm run dev"
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 6

  # ── E2E — Playwright ─────────────────────────────────────────────────────────
  # Uso: make test-e2e
  # Usa network_mode host para acessar localhost:5173 e :8080

  playwright:
    image: mcr.microsoft.com/playwright:v1.50.0-jammy
    container_name: rgm-playwright
    network_mode: host
    working_dir: /workspace
    volumes:
      - ../rgm-frontend/app:/workspace
      - npm-cache:/root/.npm
    environment:
      BASE_URL: http://localhost:5173
      API_URL: http://localhost:8080/api
      ADMIN_EMAIL: ${E2E_ADMIN_EMAIL:-admin@rgm.com}
      ADMIN_PASSWORD: ${E2E_ADMIN_PASSWORD:-admin123}
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    profiles:
      - e2e
    command: >
      sh -c "npm install --prefer-offline && npx playwright install chromium && npx playwright test"

  # ── Monitoramento (perfil: monitoring) ───────────────────────────────────────
  # Uso: make monitoring-up
  # Prometheus → http://localhost:9090
  # Grafana    → http://localhost:3000 (admin / admin)

  prometheus:
    image: prom/prometheus:latest
    container_name: rgm-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: rgm-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  pgdata:
  maven-cache:
  npm-cache:
  prometheus-data:
  grafana-data:
