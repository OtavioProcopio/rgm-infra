# Stack completa de desenvolvimento — hot reload para backend e frontend.
# Use: make up
# Alternativa leve (só infra): make infra-up  → roda backend/frontend nativo no host.

services:
  # ── Infra ───────────────────────────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    container_name: rgm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rgm}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rgm}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: rgm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: rgm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET_NAME:-images};
      mc anonymous set download local/${MINIO_BUCKET_NAME:-images};
      exit 0;
      "

  # ── Backend ─────────────────────────────────────────────────────────────────

  backend:
    image: eclipse-temurin:21-jdk-alpine
    container_name: rgm-backend-dev
    restart: unless-stopped
    volumes:
      - ../rgm-backend:/workspace
      - maven-cache:/root/.m2
    working_dir: /workspace/app
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-rgm}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-images}
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    command: >
      sh -c "chmod +x mvnw && ./mvnw spring-boot:run"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 90s
      retries: 5

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    image: node:22-alpine
    container_name: rgm-frontend-dev
    restart: unless-stopped
    volumes:
      - ../rgm-frontend/app:/workspace
      - npm-cache:/root/.npm
    working_dir: /workspace
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
      CYPRESS_INSTALL_BINARY: "0"
    command: >
      sh -c "npm install --prefer-offline && npm run dev"
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 6

  # ── E2E (Cypress) ──────────────────────────────────────────────────────────
  # Uso: make test-e2e
  # Linux only: network_mode host permite que o browser acesse localhost:5173 e :8080
  cypress:
    image: cypress/included:13.17.0
    container_name: rgm-cypress
    network_mode: host
    working_dir: /workspace
    volumes:
      - ../rgm-frontend/app:/workspace
      - npm-cache:/root/.npm
    environment:
      CYPRESS_BASE_URL: http://localhost:5173
      CYPRESS_apiUrl: http://localhost:8080/api
      CYPRESS_adminEmail: admin@rgm.com
      CYPRESS_adminPassword: admin123
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    profiles:
      - e2e

volumes:
  pgdata:
  miniodata:
  maven-cache:
  npm-cache:
