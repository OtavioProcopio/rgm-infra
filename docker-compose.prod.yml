# Stack de produção — imagens buildadas.
# Requer: make build-prod (ou imagens já publicadas no GHCR).
# Use: make prod-up

services:
  db:
    image: postgres:16-alpine
    container_name: rgm-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rgm}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rgm}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: rgm-minio-prod
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER obrigatório}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD obrigatório}
    ports:
      - "9001:9001"
    volumes:
      - miniodata-prod:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${MINIO_BUCKET_NAME:-images};
      mc anonymous set download local/${MINIO_BUCKET_NAME:-images};
      exit 0;
      "

  backend:
    build:
      context: ../rgm-backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-rgm-backend:latest}
    container_name: rgm-backend-prod
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-rgm}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER obrigatório}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD obrigatório}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-images}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET obrigatório}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  frontend:
    build:
      context: ../rgm-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    image: ${FRONTEND_IMAGE:-rgm-frontend:latest}
    container_name: rgm-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata-prod:
  miniodata-prod:
